on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

name: test-coverage

permissions:
  contents: read

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      AUTOXPLAIN_RUN_H2O: true
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::covr, any::testthat, any::plotly, any::h2o
          needs: coverage
      - name: Test coverage
        run: |
          coverage <- covr::package_coverage(quiet = FALSE)
          print(coverage)
          percentage <- covr::percent_coverage(coverage)
          message(sprintf("Measured package coverage: %.2f%%", percentage))
          summary_file <- Sys.getenv("GITHUB_STEP_SUMMARY", unset = "")
          if (nzchar(summary_file)) {
            writeLines(
              c("## Test coverage", "", sprintf("**%.2f%%** statement coverage", percentage)),
              summary_file
            )
          }
          if (percentage < 80) {
            stop(sprintf("Coverage %.2f%% is below the required 80%%.", percentage))
          }
        shell: Rscript {0}
