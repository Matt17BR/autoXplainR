on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

name: lint

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::lintr, any::spelling
          needs: lint
      - name: Lint package
        run: |
          lints <- lintr::lint_package()
          print(lints)
          if (length(lints)) stop("lintr found style or static-analysis failures.")
        shell: Rscript {0}
      - name: Check spelling
        run: |
          misspellings <- spelling::spell_check_package()
          print(misspellings)
          if (nrow(misspellings)) stop("Spelling check found unrecognized words.")
        shell: Rscript {0}
