on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

name: lint

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::lintr
          needs: lint
      - name: Lint package
        run: lintr::lint_package()
        shell: Rscript {0}
