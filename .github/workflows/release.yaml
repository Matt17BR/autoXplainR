on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

name: release

permissions:
  contents: write

jobs:
  source-package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      AUTOXPLAIN_RUN_H2O: false
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::rcmdcheck, any::knitr, any::rmarkdown, any::urlchecker
          needs: check
      - name: Match tag and package version
        if: github.ref_type == 'tag'
        run: |
          version <- read.dcf("DESCRIPTION", fields = "Version")[[1L]]
          expected <- paste0("v", version)
          actual <- Sys.getenv("GITHUB_REF_NAME")
          if (!identical(actual, expected)) {
            stop("Release tag ", actual, " does not match package version ", expected, ".")
          }
        shell: Rscript {0}
      - name: Check source package
        run: rcmdcheck::rcmdcheck(args = c("--as-cran", "--no-manual"), error_on = "error")
        shell: Rscript {0}
      - name: Check documentation links
        run: |
          problems <- urlchecker::url_check()
          print(problems)
          if (nrow(problems)) stop("Documentation contains unreachable URLs.")
        shell: Rscript {0}
      - name: Build release artifact
        run: |
          mkdir -p release
          R CMD build .
          mv AutoXplainR_*.tar.gz release/
          cd release
          sha256sum AutoXplainR_*.tar.gz > SHA256SUMS
      - name: Upload source package
        uses: actions/upload-artifact@v7
        with:
          name: AutoXplainR-source
          path: release/
          if-no-files-found: error
      - name: Create draft GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" release/* --draft --generate-notes --verify-tag
