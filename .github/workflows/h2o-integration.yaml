on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'

name: H2O-integration

permissions:
  contents: read

jobs:
  h2o:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      AUTOXPLAIN_RUN_H2O: true
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::devtools, any::testthat, any::h2o
      - name: Run isolated H2O tests
        run: devtools::test(filter = "h2o", stop_on_failure = TRUE)
        shell: Rscript {0}
