on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

name: R-CMD-check

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest, r: release}
          - {os: windows-latest, r: release}
          - {os: ubuntu-latest, r: devel, http-user-agent: release}
          - {os: ubuntu-latest, r: release}
          - {os: ubuntu-latest, r: oldrel-1}
          - {os: ubuntu-22.04, r: '4.1'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false
      AUTOXPLAIN_RUN_H2O: false
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: >-
            any::rcmdcheck,
            any::testthat,
            any::knitr,
            any::rmarkdown,
            any::roxygen2
          needs: check
      - name: Verify generated documentation is committed
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.r == 'release'
        run: |
          roxygen2::roxygenise(".")
          changed <- system2(
            "git", c(
              "status", "--porcelain", "--", "DESCRIPTION", "NAMESPACE", "man"
            ),
            stdout = TRUE
          )
          if (length(changed)) {
            cat(changed, sep = "\n")
            stop("Run devtools::document() and commit the generated files.")
          }
        shell: Rscript {0}
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual")'

  source-package:
    name: Ubuntu R-devel (exact source archive)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false
      AUTOXPLAIN_RUN_H2O: false
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: devel
          http-user-agent: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::rcmdcheck
          needs: check
      - name: Build once and fully check the exact source archive
        run: |
          bash .github/scripts/build-check-source.sh \
            "$RUNNER_TEMP/release" \
            "$RUNNER_TEMP/check" \
            --as-cran \
            --no-manual
      - name: Upload checked source and check log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: AutoXplainR-CRAN-source-${{ github.sha }}
          path: |
            ${{ runner.temp }}/release/
            ${{ runner.temp }}/check/**/*.log
            ${{ runner.temp }}/check/**/*.tex
            ${{ runner.temp }}/check/**/*.out
          if-no-files-found: warn
          retention-days: 7
