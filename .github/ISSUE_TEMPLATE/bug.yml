name: Bug report
description: Report a reproducible defect in AutoXplainR
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Remove private data, fitted proprietary models, and API keys before posting."
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reprex
    attributes:
      label: Minimal reproducible example
      render: r
    validations:
      required: true
  - type: textarea
    id: session
    attributes:
      label: Session information
      description: Paste the output of sessionInfo().
      render: text
    validations:
      required: true
  - type: dropdown
    id: integration
    attributes:
      label: Optional integration
      options:
        - None / guided base workflow
        - H2O
        - Plotly
        - Gemini
        - Groq
        - Ollama
        - OpenRouter
        - Custom narrative endpoint
    validations:
      required: true
