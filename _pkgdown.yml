url: https://matt17br.github.io/autoXplainR/
template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#176b4d"
    base_font:
      google: Inter
    heading_font:
      google: Inter
navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github, lightswitch]
reference:
  - title: Guided workflow
    contents:
      - autoxplain
      - tuning_results
      - tuning_control
      - as_explainers
      - calibration_diagnostics
      - threshold_diagnostics
      - missingness_shift
      - subgroup_performance
      - render_model_report
      - generate_natural_language_report
      - narrative_providers
      - prediction_ambiguity
      - compare_model_behavior
      - compare_model_effects
  - title: Model-agnostic evidence workflow
    contents:
      - explain_model
      - predict.autoxplain_explainer
      - audit_explanations
      - summary.autoxplain_audit
      - render_explanation_report
      - explain_effect
  - title: Explanation estimators
    contents:
      - calculate_permutation_importance
      - calculate_accumulated_local_effects
      - calculate_partial_dependence
      - calculate_partial_dependence_multi
  - title: Fitting and preprocessing
    contents:
      - learner_catalog
      - install_model_engines
      - preprocess_data
  - title: Visualization and metadata
    contents:
      - starts_with("plot_")
      - plot.autoxplain_model_effects
      - model_tradeoffs
      - extract_model_characteristics
  - title: Compatibility helpers
    desc: Legacy entry points retained for existing code; new analyses should use the guided evidence workflow above.
    contents:
      - generate_dashboard
      - create_simple_dashboard
      - create_model_comparison_report
      - calculate_weighted_efficiency
      - preprocess_for_h2o
articles:
  - title: Get started
    navbar: ~
    contents:
      - autoxplainr-introduction
